name: Lighthouse and HTML Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Lighthouse + HTML Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install audit tools
        run: |
          npm install --no-save lighthouse html-validate

      - name: Run HTML validation
        run: npm run validate:html

      - name: Run Lighthouse Audit (home page)
        run: |
          node scripts/dev-server.js --host 127.0.0.1 --port 8000 > dev-server.log 2>&1 &
          sleep 2
          npx lighthouse http://127.0.0.1:8000/ --output=json --output-path=./lighthouse-home.json --quiet --chrome-flags="--headless --no-sandbox"
          pkill -f "scripts/dev-server.js" || true

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-home-report
          path: lighthouse-home.json

      - name: Upload Dev Server Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log
          path: dev-server.log
