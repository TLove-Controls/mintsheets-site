name: Lighthouse and HTML Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Lighthouse + HTML Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          npm install -g lighthouse html-validate

      - name: Run HTML validation
        run: |
          html-validate "**/*.html" --config .htmlvalidate.json || true

      - name: Run Lighthouse Audit (home page)
        run: |
          nohup python3 -m http.server 8000 &
          sleep 2
          lighthouse http://127.0.0.1:8000 --output=json --output-path=./lighthouse-home.json --quiet --chrome-flags="--headless"
          pkill -f "http.server" || true

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-home-report
          path: lighthouse-home.json
