
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary)}
.app{display:grid;grid-template-columns:260px 1fr;gap:0;height:100vh;min-height:600px}
.panel{background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);overflow-y:auto;padding:12px}
.canvas-area{background:var(--color-background-primary);overflow:hidden;display:flex;flex-direction:column}
.section-hdr{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.fitting-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.fitting-btn{border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:8px 4px;cursor:pointer;background:var(--color-background-primary);text-align:center;font-size:11px;color:var(--color-text-secondary);transition:all .15s;line-height:1.3}
.fitting-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.fitting-btn.active{border-color:#185FA5;background:#E6F1FB;color:#0C447C}
.fitting-icon{font-size:18px;display:block;margin-bottom:3px}
.inp-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:6px;margin-bottom:8px}
.inp-row label{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.inp-row input{border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:4px 6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%;text-align:right}
.inp-row input:focus{outline:none;border-color:#185FA5}
.inp-unit{font-size:11px;color:var(--color-text-tertiary);width:24px}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.tb-btn{border:0.5px solid var(--color-border-tertiary);border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.tb-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.tb-btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.tb-btn.primary:hover{background:#0C447C}
.svg-wrap{flex:1;overflow:hidden;position:relative}
.svg-wrap svg{width:100%;height:100%}
.info-bar{display:flex;gap:16px;padding:6px 12px;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);font-size:11px;color:var(--color-text-secondary)}
.info-bar span b{color:var(--color-text-primary);font-weight:500}
select{border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:4px 6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.sub-hdr{font-size:10px;color:var(--color-text-tertiary);margin:0 0 4px;text-transform:uppercase;letter-spacing:.05em}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:10px 0}
</style>

<div class="app">
<div class="panel">
  <div class="section-hdr">Fitting Type</div>
  <div class="fitting-grid" id="fittingGrid"></div>

  <hr class="divider">
  <div class="section-hdr">Dimensions</div>
  <div id="dimInputs"></div>

  <hr class="divider">
  <div class="section-hdr">Drawing Options</div>
  <div class="inp-row" style="grid-template-columns:auto 1fr">
    <label>Gauge</label>
    <select id="gaugeSelect" onchange="redraw()">
      <option value="26">26 ga (0.018")</option>
      <option value="24" selected>24 ga (0.024")</option>
      <option value="22">22 ga (0.030")</option>
      <option value="20">20 ga (0.036")</option>
      <option value="18">18 ga (0.048")</option>
      <option value="16">16 ga (0.060")</option>
    </select>
  </div>
  <div class="inp-row" style="grid-template-columns:auto 1fr">
    <label>Units</label>
    <select id="unitSelect" onchange="changeUnit()">
      <option value="in">Inches</option>
      <option value="mm">Millimeters</option>
    </select>
  </div>
  <div class="inp-row" style="grid-template-columns:auto 1fr">
    <label>Scale</label>
    <select id="scaleSelect" onchange="redraw()">
      <option value="0.25">1/4" = 1'-0"</option>
      <option value="0.375">3/8" = 1'-0"</option>
      <option value="0.5" selected>1/2" = 1'-0"</option>
      <option value="0.75">3/4" = 1'-0"</option>
      <option value="1">1" = 1'-0"</option>
      <option value="1.5">1-1/2" = 1'-0"</option>
    </select>
  </div>

  <hr class="divider">
  <div class="section-hdr">Title Block</div>
  <div style="margin-bottom:6px"><div class="sub-hdr">Project</div><input id="tbProject" type="text" value="Your HVAC Co." style="width:100%;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:4px 6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary)" oninput="redraw()"></div>
  <div style="margin-bottom:6px"><div class="sub-hdr">Drawing No.</div><input id="tbDrawNo" type="text" value="HVAC-101" style="width:100%;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:4px 6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary)" oninput="redraw()"></div>
  <div style="margin-bottom:6px"><div class="sub-hdr">Drawn By</div><input id="tbDrawnBy" type="text" value="Technician" style="width:100%;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:4px 6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary)" oninput="redraw()"></div>

  <hr class="divider">
  <div class="section-hdr">Notes</div>
  <textarea id="notesField" style="width:100%;height:72px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:6px;font-size:11px;background:var(--color-background-primary);color:var(--color-text-primary);resize:none;line-height:1.5" oninput="redraw()">1. All ductwork per SMACNA standards.
2. Seams sealed per SMACNA Class A.
3. Gauge per SMACNA Table 1-14.</textarea>
</div>

<div class="canvas-area">
  <div class="toolbar">
    <span style="font-size:12px;font-weight:500;color:var(--color-text-primary)" id="fittingTitle">Straight Duct Section</span>
    <div style="flex:1"></div>
    <button class="tb-btn" onclick="toggleGrid()">Grid</button>
    <button class="tb-btn" onclick="toggleDims()">Dims</button>
    <button class="tb-btn" onclick="toggleCL()">C/L</button>
    <button class="tb-btn" onclick="zoomFit()">Fit</button>
    <button class="tb-btn primary" onclick="exportSVG()">Export SVG</button>
  </div>
  <div class="svg-wrap" id="svgWrap">
    <svg id="mainSvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="info-bar">
    <span>Fitting: <b id="infoFitting">Straight</b></span>
    <span>W×H: <b id="infoWH">—</b></span>
    <span>Area: <b id="infoArea">—</b></span>
    <span>Velocity (2000 fpm): <b id="infoCFM">—</b></span>
    <span>Gauge: <b id="infoGauge">24 ga</b></span>
    <span>SMACNA Class: <b id="infoClass">A (≤2")</b></span>
  </div>
</div>
</div>

<script>
const FITTINGS=[
  {id:'straight',  label:'Straight\nDuct',     icon:'▭',  dims:['W','H','L']},
  {id:'elbow90',   label:'90° Elbow',           icon:'↱',  dims:['W','H','R']},
  {id:'elbow45',   label:'45° Elbow',           icon:'↗',  dims:['W','H','R']},
  {id:'tee',       label:'Tee\nBranch',         icon:'⊤',  dims:['W','H','Wb','Hb']},
  {id:'wye',       label:'Wye\nBranch',         icon:'Y',  dims:['W','H','Wb','Hb']},
  {id:'reducer',   label:'Reducer\nConcentric', icon:'◁▷', dims:['W','H','W2','H2','L']},
  {id:'offset',    label:'Offset',              icon:'⇥',  dims:['W','H','O','L']},
  {id:'cap',       label:'End\nCap',            icon:'⊡',  dims:['W','H']},
  {id:'cross',     label:'Cross\nFitting',      icon:'+',  dims:['W','H','Wb','Hb']},
  {id:'transition',label:'Square\nTransition',  icon:'△',  dims:['W','H','W2','H2','L']},
];

const DIM_DEFAULTS={W:24,H:18,H2:12,W2:16,L:36,R:18,Wb:12,Hb:12,O:12};
const DIM_LABELS={W:'Width (A)',H:'Height (B)',W2:'Outlet W',H2:'Outlet H',L:'Length',R:'Radius (C/L)',Wb:'Branch W',Hb:'Branch H',O:'Offset'};

let state={
  fitting:'straight', dims:{...DIM_DEFAULTS},
  showGrid:true, showDims:true, showCL:true, unit:'in',
  zoom:1, panX:0, panY:0
};

function toggleGrid(){state.showGrid=!state.showGrid;redraw()}
function toggleDims(){state.showDims=!state.showDims;redraw()}
function toggleCL(){state.showCL=!state.showCL;redraw()}
function changeUnit(){state.unit=document.getElementById('unitSelect').value;redraw()}

function buildFittingGrid(){
  const g=document.getElementById('fittingGrid');
  g.innerHTML='';
  FITTINGS.forEach(f=>{
    const b=document.createElement('button');
    b.className='fitting-btn'+(state.fitting===f.id?' active':'');
    b.innerHTML=`<span class="fitting-icon">${f.icon}</span>${f.label.replace('\n','<br>')}`;
    b.onclick=()=>{state.fitting=f.id;buildFittingGrid();buildDimInputs();redraw()};
    g.appendChild(b);
  });
}

function buildDimInputs(){
  const fit=FITTINGS.find(f=>f.id===state.fitting);
  const c=document.getElementById('dimInputs');
  c.innerHTML='';
  fit.dims.forEach(d=>{
    const row=document.createElement('div');
    row.className='inp-row';
    const lbl=document.createElement('label');
    lbl.textContent=DIM_LABELS[d]||d;
    const inp=document.createElement('input');
    inp.type='number';inp.min=1;inp.max=9999;
    inp.value=state.dims[d]||12;
    inp.oninput=()=>{state.dims[d]=+inp.value||1;redraw()};
    const unit=document.createElement('span');
    unit.className='inp-unit';unit.textContent=state.unit;
    row.append(lbl,inp,unit);
    c.appendChild(row);
  });
  document.getElementById('fittingTitle').textContent=FITTINGS.find(f=>f.id===state.fitting).label.replace('\n',' ');
}

function fmt(v){return state.unit==='mm'?(v*25.4).toFixed(0)+'"':v+'"'}
function fmtDim(v){return state.unit==='mm'?Math.round(v*25.4)+' mm':v+'"'}

function getScale(){return +document.getElementById('scaleSelect').value}

const CLR={object:'#1B3A6B',dim:'#185FA5',cl:'#CC0000',hidden:'#888',grid:'#D6E4F0',fill:'#F0F4F8',hatch:'#CBD4E1',title:'#1B3A6B'};

function line(x1,y1,x2,y2,stroke,sw,dash=''){return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${stroke}" stroke-width="${sw}" ${dash?`stroke-dasharray="${dash}"`:''}/>` }
function rect2(x,y,w,h,stroke,sw,fill='none',dash=''){return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" stroke="${stroke}" stroke-width="${sw}" fill="${fill}" ${dash?`stroke-dasharray="${dash}"`:''}/>` }
function txt(x,y,t,size,anchor,fill,weight='normal'){return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="${size}" text-anchor="${anchor}" fill="${fill}" font-weight="${weight}" font-family="'Arial',sans-serif">${t}</text>`}
function arrow(x1,y1,x2,y2,color){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return'';
  const ux=dx/len,uy=dy/len;
  const ax=x2-ux*7,ay=y2-uy*7;
  const px=-uy*3,py=ux*3;
  return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="0.7"/>
<polygon points="${x2.toFixed(1)},${y2.toFixed(1)} ${(ax+px).toFixed(1)},${(ay+py).toFixed(1)} ${(ax-px).toFixed(1)},${(ay-py).toFixed(1)}" fill="${color}"/>`;
}
function dimLine(x1,y1,x2,y2,label,offset=18,horiz=true){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  let svgParts='';
  if(horiz){
    const oy=y1-offset;
    svgParts+=line(x1,y1,x1,oy-3,CLR.dim,0.5);
    svgParts+=line(x2,y2,x2,oy-3,CLR.dim,0.5);
    svgParts+=arrow(x1,oy,x2,oy,CLR.dim);
    svgParts+=arrow(x2,oy,x1,oy,CLR.dim);
    svgParts+=txt(mx,oy-4,label,8,'middle',CLR.dim);
  } else {
    const ox=x1-offset;
    svgParts+=line(x1,y1,ox-3,y1,CLR.dim,0.5);
    svgParts+=line(x2,y2,ox-3,y2,CLR.dim,0.5);
    svgParts+=arrow(ox,y1,ox,y2,CLR.dim);
    svgParts+=arrow(ox,y2,ox,y1,CLR.dim);
    svgParts+=`<text x="${(ox-4).toFixed(1)}" y="${my.toFixed(1)}" font-size="8" text-anchor="middle" fill="${CLR.dim}" font-family="'Arial',sans-serif" transform="rotate(-90,${(ox-4).toFixed(1)},${my.toFixed(1)})">${label}</text>`;
  }
  return svgParts;
}

function clLine(x1,y1,x2,y2){
  return line(x1,y1,x2,y2,CLR.cl,0.5,'6 3 1 3');
}

function drawGrid(W,H,step=12){
  if(!state.showGrid)return'';
  let g='<g opacity="0.5">';
  for(let x=0;x<=W;x+=step) g+=line(x,0,x,H,CLR.grid,0.3);
  for(let y=0;y<=H;y+=step) g+=line(0,y,W,y,CLR.grid,0.3);
  g+='</g>';
  return g;
}

function hatchRect(x,y,w,h){
  let g=`<clipPath id="hcp"><rect x="${x}" y="${y}" width="${w}" height="${h}"/></clipPath><g clip-path="url(#hcp)" opacity="0.35">`;
  for(let i=-(h);i<w+h;i+=8) g+=`<line x1="${(x+i).toFixed(1)}" y1="${y.toFixed(1)}" x2="${(x+i+h).toFixed(1)}" y2="${(y+h).toFixed(1)}" stroke="${CLR.hatch}" stroke-width="0.5"/>`;
  g+='</g>';
  return g;
}

function cornerMarks(x,y,w,h,s=6){
  return [
    line(x,y+s,x,y,CLR.object,1)+line(x,y,x+s,y,CLR.object,1),
    line(x+w-s,y,x+w,y,CLR.object,1)+line(x+w,y,x+w,y+s,CLR.object,1),
    line(x,y+h-s,x,y+h,CLR.object,1)+line(x,y+h,x+s,y+h,CLR.object,1),
    line(x+w-s,y+h,x+w,y+h,CLR.object,1)+line(x+w,y+h,x+w,y+h-s,CLR.object,1),
  ].join('');
}

function titleBlock(svgW,svgH,tbH=80){
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'});
  const proj=document.getElementById('tbProject').value;
  const drawNo=document.getElementById('tbDrawNo').value;
  const drawBy=document.getElementById('tbDrawnBy').value;
  const gauge=document.getElementById('gaugeSelect').value+' ga';
  const scale=document.getElementById('scaleSelect').options[document.getElementById('scaleSelect').selectedIndex].text;
  const fitting=FITTINGS.find(f=>f.id===state.fitting).label.replace('\n',' ');
  const y=svgH-tbH;
  let s=`<rect x="0" y="${y}" width="${svgW}" height="${tbH}" fill="white" stroke="${CLR.object}" stroke-width="0.5"/>`;
  s+=`<rect x="0" y="${y}" width="${svgW}" height="20" fill="${CLR.title}" stroke="${CLR.title}" stroke-width="0.5"/>`;
  s+=txt(8,y+13,'Your HVAC Co. — Rectangular Fitting Drafting Template',11,'start','white','bold');
  s+=txt(svgW-8,y+13,proj,9,'end','rgba(255,255,255,0.8)');
  const col1=8, col2=Math.round(svgW*0.25), col3=Math.round(svgW*0.5), col4=Math.round(svgW*0.73);
  const r1=y+33,r2=y+51,r3=y+69;
  const lc='#888',vc='#222';
  s+=txt(col1,r1,'Fitting:',8,'start',lc)+txt(col1+40,r1,fitting,8,'start',vc,'bold');
  s+=txt(col2,r1,'Drawing No:',8,'start',lc)+txt(col2+52,r1,drawNo,8,'start',vc,'bold');
  s+=txt(col3,r1,'Scale:',8,'start',lc)+txt(col3+32,r1,scale,8,'start',vc);
  s+=txt(col4,r1,'Gauge:',8,'start',lc)+txt(col4+32,r1,gauge,8,'start',vc);
  s+=txt(col1,r2,'Duct W:',8,'start',lc)+txt(col1+40,r2,fmtDim(state.dims.W||24),8,'start',vc,'bold');
  s+=txt(col2,r2,'Duct H:',8,'start',lc)+txt(col2+36,r2,fmtDim(state.dims.H||18),8,'start',vc,'bold');
  s+=txt(col3,r2,'Drawn By:',8,'start',lc)+txt(col3+40,r2,drawBy,8,'start',vc);
  s+=txt(col4,r2,'Date:',8,'start',lc)+txt(col4+24,r2,dateStr,8,'start',vc);
  s+=txt(col1,r3,'SMACNA Standard:',8,'start',lc)+txt(col1+72,r3,'HVAC Duct Construction Standard — Metal & Flexible',8,'start',vc);
  s+=txt(col3,r3,'Sealing:',8,'start',lc)+txt(col3+34,r3,'Class A — All Seams & Joints',8,'start',vc);
  const notes=document.getElementById('notesField').value.split('\n').filter(n=>n.trim());
  if(notes.length){
    const nx=svgW*0.73, ny=y+22;
    s+=`<rect x="${nx}" y="${ny}" width="${svgW-nx-4}" height="${tbH-22-4}" fill="#F8F9FA" stroke="#DDD" stroke-width="0.3"/>`;
    s+=txt(nx+4,ny+10,'Notes:',7.5,'start','#555','bold');
    notes.slice(0,4).forEach((n,i)=>{ s+=txt(nx+4,ny+20+i*12,n,7,'start','#333'); });
  }
  return s;
}

function drawStraight(cx,cy,W,H,L,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, sl=L*sc;
  const ox=cx-sl/2, oy=cy-sh/2;
  const ex=cx+sl/2, ey=cy+sh/2;
  const viewT=oy-pad, viewB=ey+pad, viewL=ox-pad-40, viewR=ex+pad;
  if(state.showGrid) s+=drawGrid(1200,800);
  s+=hatchRect(ox,oy,sl,sh);
  s+=rect2(ox,oy,sl,sh,CLR.object,1.2,CLR.fill);
  s+=`<rect x="${ox.toFixed(1)}" y="${oy.toFixed(1)}" width="${sl.toFixed(1)}" height="${sh.toFixed(1)}" stroke="${CLR.object}" stroke-width="1.2" fill="none"/>`;
  const seam1=ox+sl*0.5;
  s+=line(seam1,oy,seam1,ey,CLR.object,0.4,'2 2');
  if(state.showCL){
    s+=clLine(ox-20,cy,ex+20,cy);
    s+=clLine(cx,oy-15,cx,ey+15);
  }
  if(state.showDims){
    s+=dimLine(ox,oy,ex,oy,fmtDim(L),20,true);
    s+=dimLine(ex,oy,ex,ey,fmtDim(H),22,false);
  }
  s+=txt(cx,cy+3,`${fmtDim(W)} × ${fmtDim(H)}`,9,'middle',CLR.object,'bold');
  s+=cornerMarks(ox,oy,sl,sh);
  return {s, bounds:{x:viewL,y:viewT,w:viewR-viewL,h:viewB-viewT}};
}

function drawElbow(cx,cy,W,H,R,angle,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, sr=R*sc;
  const ang=angle*Math.PI/180;
  const OR=sr+sw/2, IR=sr-sw/2;
  const ox=cx, oy=cy;
  s+=`<path d="M ${(ox-sw/2).toFixed(1)} ${oy.toFixed(1)} L ${(ox-sw/2).toFixed(1)} ${(oy-IR).toFixed(1)} A ${IR.toFixed(1)} ${IR.toFixed(1)} 0 0 1 ${(ox+IR*Math.sin(ang)).toFixed(1)} ${(oy-IR*Math.cos(ang)).toFixed(1)} L ${(ox+OR*Math.sin(ang)).toFixed(1)} ${(oy-OR*Math.cos(ang)).toFixed(1)} A ${OR.toFixed(1)} ${OR.toFixed(1)} 0 0 0 ${(ox+sw/2).toFixed(1)} ${(oy).toFixed(1)} Z" fill="${CLR.fill}" stroke="${CLR.object}" stroke-width="1.2"/>`;
  if(state.showCL){
    s+=`<path d="M ${ox.toFixed(1)} ${(oy).toFixed(1)} L ${ox.toFixed(1)} ${(oy-sr).toFixed(1)} A ${sr.toFixed(1)} ${sr.toFixed(1)} 0 0 1 ${(ox+sr*Math.sin(ang)).toFixed(1)} ${(oy-sr*Math.cos(ang)).toFixed(1)}" fill="none" stroke="${CLR.cl}" stroke-width="0.5" stroke-dasharray="6 3 1 3"/>`;
  }
  const rLabel=angle===90?fmtDim(R)+' C/L R':fmtDim(R)+' C/L R';
  const ex=ox+OR*Math.sin(ang)+10, ey=oy-OR*Math.cos(ang)-5;
  if(state.showDims){
    s+=dimLine(ox-sw/2,oy,ox+sw/2,oy,fmtDim(W),-16,true);
    s+=txt(ox-8,oy-sr/2-4,rLabel,8,'end',CLR.dim);
  }
  s+=txt(ox+(sw/2+10),oy-sh/4,`${fmtDim(W)}×${fmtDim(H)}`,8,'start',CLR.object);
  const bounds={x:ox-OR-40,y:oy-OR-40,w:OR*2+80,h:OR+80};
  return {s,bounds};
}

function drawTee(cx,cy,W,H,Wb,Hb,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, sbw=Wb*sc, sbh=Hb*sc;
  const mainL=sw*3;
  const ox=cx-mainL/2, oy=cy-sh/2;
  const ex=cx+mainL/2, ey=cy+sh/2;
  const branchY=oy-sbh;
  const branchX=cx-sbw/2;
  s+=hatchRect(ox,oy,mainL,sh);
  s+=rect2(ox,oy,mainL,sh,CLR.object,1.2,CLR.fill);
  s+=hatchRect(branchX,branchY,sbw,sh);
  s+=rect2(branchX,branchY,sbw,sh,CLR.object,1.2,CLR.fill);
  if(state.showCL){
    s+=clLine(ox-15,cy,ex+15,cy);
    s+=clLine(cx,oy-sbh-15,cx,ey+15);
  }
  if(state.showDims){
    s+=dimLine(ox,oy,ex,oy,fmtDim(W*3),20,true);
    s+=dimLine(ex,oy,ex,ey,fmtDim(H),22,false);
    s+=dimLine(branchX,branchY,branchX+sbw,branchY,fmtDim(Wb),-16,true);
    s+=dimLine(cx+sbw/2,branchY,cx+sbw/2,oy,fmtDim(Hb),22,false);
  }
  s+=txt(cx,cy+4,`${fmtDim(W)}×${fmtDim(H)}`,9,'middle',CLR.object,'bold');
  s+=txt(cx+sbw/2+12,branchY+sbh/2,`${fmtDim(Wb)}×${fmtDim(Hb)}`,8,'start',CLR.object);
  const bounds={x:ox-50,y:branchY-40,w:mainL+100,h:ey-branchY+80};
  return {s,bounds};
}

function drawReducer(cx,cy,W,H,W2,H2,L,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, sw2=W2*sc, sh2=H2*sc, sl=L*sc;
  const ox=cx-sl/2, oy=cy-sh/2;
  const ex=cx+sl/2;
  const dh=(sh-sh2)/2;
  const pts=`${ox.toFixed(1)},${oy.toFixed(1)} ${ex.toFixed(1)},${(oy+dh).toFixed(1)} ${ex.toFixed(1)},${(oy+dh+sh2).toFixed(1)} ${ox.toFixed(1)},${(oy+sh).toFixed(1)}`;
  s+=`<polygon points="${pts}" fill="${CLR.fill}" stroke="${CLR.object}" stroke-width="1.2"/>`;
  s+=line(ox,oy,ox,oy+sh,CLR.object,1.5);
  s+=line(ex,oy+dh,ex,oy+dh+sh2,CLR.object,1.5);
  if(state.showCL) s+=clLine(ox-15,cy,ex+15,cy);
  if(state.showDims){
    s+=dimLine(ox,oy,ex,oy,fmtDim(L),22,true);
    s+=dimLine(ox-4,oy,ox-4,oy+sh,fmtDim(H),22,false);
    s+=dimLine(ex+4,oy+dh,ex+4,oy+dh+sh2,fmtDim(H2),22,false);
    s+=dimLine(ox,oy,ox+sw,oy,fmtDim(W),-18,true);
    s+=dimLine(ex,oy+dh,ex+sw2,oy+dh,fmtDim(W2),-18,true);
  }
  s+=txt(ox+sl*0.25,cy+3,fmtDim(W)+'×'+fmtDim(H),8,'middle',CLR.object,'bold');
  s+=txt(ex-sl*0.15,cy+3,fmtDim(W2)+'×'+fmtDim(H2),8,'middle',CLR.object);
  const bounds={x:ox-70,y:oy-40,w:sl+120,h:sh+80};
  return {s,bounds};
}

function drawOffset(cx,cy,W,H,O,L,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, so=O*sc, sl=L*sc;
  const ox=cx-sl/2, oy=cy-sh/2;
  const mid=sl/2;
  const pts=`${ox.toFixed(1)},${oy.toFixed(1)} ${(ox+mid).toFixed(1)},${oy.toFixed(1)} ${(ox+mid).toFixed(1)},${(oy+so).toFixed(1)} ${(ox+sl).toFixed(1)},${(oy+so).toFixed(1)} ${(ox+sl).toFixed(1)},${(oy+so+sh).toFixed(1)} ${(ox+mid).toFixed(1)},${(oy+so+sh).toFixed(1)} ${(ox+mid).toFixed(1)},${(oy+sh).toFixed(1)} ${ox.toFixed(1)},${(oy+sh).toFixed(1)} Z`;
  s+=`<polygon points="${pts}" fill="${CLR.fill}" stroke="${CLR.object}" stroke-width="1.2"/>`;
  if(state.showCL){
    s+=clLine(ox-15,cy,ox+mid,cy);
    s+=clLine(ox+mid,cy,ox+mid,cy+so);
    s+=clLine(ox+mid,cy+so,ox+sl+15,cy+so);
  }
  if(state.showDims){
    s+=dimLine(ox,oy,ox+sl,oy,fmtDim(L),20,true);
    s+=dimLine(ox-4,oy,ox-4,oy+sh,fmtDim(H),24,false);
    s+=dimLine(ox+mid+4,oy+sh,ox+mid+4,oy+so+sh,fmtDim(O),22,false);
  }
  s+=txt(ox+mid/2,cy+3,fmtDim(W)+'×'+fmtDim(H),8,'middle',CLR.object,'bold');
  const bounds={x:ox-60,y:oy-40,w:sl+100,h:so+sh+80};
  return {s,bounds};
}

function drawCap(cx,cy,W,H,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc;
  const ox=cx-sw/2, oy=cy-sh/2;
  const ex=cx+sw/2, ey=cy+sh/2;
  const capH=sh*0.4;
  const pts=`${ox.toFixed(1)},${oy.toFixed(1)} ${ex.toFixed(1)},${oy.toFixed(1)} ${ex.toFixed(1)},${ey.toFixed(1)} ${(cx+sw*0.35).toFixed(1)},${(ey+capH).toFixed(1)} ${(cx-sw*0.35).toFixed(1)},${(ey+capH).toFixed(1)} ${ox.toFixed(1)},${ey.toFixed(1)} Z`;
  s+=`<polygon points="${pts}" fill="${CLR.fill}" stroke="${CLR.object}" stroke-width="1.2"/>`;
  s+=line(ox,oy,ox,oy+sh,CLR.object,1.5);
  s+=line(ex,oy,ex,ey,CLR.object,1.5);
  s+=txt(cx,cy+4,fmtDim(W)+'×'+fmtDim(H),9,'middle',CLR.object,'bold');
  if(state.showCL) s+=clLine(cx,oy-15,cx,ey+capH+15);
  if(state.showDims){
    s+=dimLine(ox,oy,ex,oy,fmtDim(W),20,true);
    s+=dimLine(ex,oy,ex,ey,fmtDim(H),22,false);
  }
  const bounds={x:ox-50,y:oy-40,w:sw+80,h:sh+capH+80};
  return {s,bounds};
}

function drawWye(cx,cy,W,H,Wb,Hb,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, sbw=Wb*sc, sbh=Hb*sc;
  const mainL=sw*2.5;
  const ox=cx-mainL/2, oy=cy-sh/2;
  const ex=cx+mainL/2, ey=cy+sh/2;
  s+=hatchRect(ox,oy,mainL,sh);
  s+=rect2(ox,oy,mainL,sh,CLR.object,1.2,CLR.fill);
  const bx=cx+sw*0.3, by=oy;
  const ang=45*Math.PI/180;
  const blen=sbw*1.8;
  const pts=`${bx.toFixed(1)},${by.toFixed(1)} ${(bx+Math.cos(ang)*blen).toFixed(1)},${(by-Math.sin(ang)*blen).toFixed(1)} ${(bx+Math.cos(ang)*blen+sbh*Math.sin(ang)).toFixed(1)},${(by-Math.sin(ang)*blen+sbh*Math.cos(ang)).toFixed(1)} ${(bx+sbh*Math.sin(ang)).toFixed(1)},${(by+sbh*Math.cos(ang)).toFixed(1)} Z`;
  s+=`<polygon points="${pts}" fill="${CLR.fill}" stroke="${CLR.object}" stroke-width="1.2"/>`;
  if(state.showCL){
    s+=clLine(ox-15,cy,ex+15,cy);
    s+=clLine(bx+sbh/2*Math.sin(ang),by+sbh/2*Math.cos(ang),bx+Math.cos(ang)*blen+sbh/2*Math.sin(ang),by-Math.sin(ang)*blen+sbh/2*Math.cos(ang));
  }
  if(state.showDims){
    s+=dimLine(ox,oy,ex,oy,fmtDim(W*2.5),22,true);
    s+=dimLine(ex,oy,ex,ey,fmtDim(H),24,false);
  }
  s+=txt(cx-sw*0.3,cy+4,`${fmtDim(W)}×${fmtDim(H)}`,9,'middle',CLR.object,'bold');
  s+=txt(bx+Math.cos(ang)*blen*0.6+sbh*Math.sin(ang)/2+8,by-Math.sin(ang)*blen*0.6+sbh*Math.cos(ang)/2,`${fmtDim(Wb)}×${fmtDim(Hb)}`,8,'start',CLR.object);
  s+=txt(cx+sw*0.7,cy+4,'45°',8,'middle',CLR.dim);
  const bounds={x:ox-60,y:by-Math.sin(ang)*blen-sbh-40,w:mainL+Math.cos(ang)*blen+sbh+100,h:sh+Math.sin(ang)*blen+sbh+80};
  return {s,bounds};
}

function drawCross(cx,cy,W,H,Wb,Hb,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, sbw=Wb*sc, sbh=Hb*sc;
  const mainL=sw*3;
  const ox=cx-mainL/2, oy=cy-sh/2;
  const ex=cx+mainL/2, ey=cy+sh/2;
  s+=hatchRect(ox,oy,mainL,sh);
  s+=rect2(ox,oy,mainL,sh,CLR.object,1.2,CLR.fill);
  const branchTopX=cx-sbw/2, branchTopY=oy-sbh;
  const branchBotX=cx-sbw/2, branchBotY=ey;
  s+=hatchRect(branchTopX,branchTopY,sbw,sh);
  s+=rect2(branchTopX,branchTopY,sbw,sh,CLR.object,1.2,CLR.fill);
  s+=hatchRect(branchBotX,branchBotY,sbw,sh);
  s+=rect2(branchBotX,branchBotY,sbw,sh,CLR.object,1.2,CLR.fill);
  if(state.showCL){
    s+=clLine(ox-15,cy,ex+15,cy);
    s+=clLine(cx,oy-sbh-15,cx,ey+sbh+15);
  }
  if(state.showDims){
    s+=dimLine(ox,oy,ex,oy,fmtDim(W*3),22,true);
    s+=dimLine(ex,oy,ex,ey,fmtDim(H),24,false);
    s+=dimLine(branchTopX,branchTopY,branchTopX+sbw,branchTopY,fmtDim(Wb),-18,true);
    s+=dimLine(cx+sbw/2,branchTopY,cx+sbw/2,oy,fmtDim(Hb),24,false);
  }
  s+=txt(cx,cy+4,`${fmtDim(W)}×${fmtDim(H)}`,9,'middle',CLR.object,'bold');
  s+=txt(cx+sbw/2+8,branchTopY+sh/2,`${fmtDim(Wb)}×${fmtDim(Hb)}`,8,'start',CLR.object);
  const bounds={x:ox-60,y:branchTopY-40,w:mainL+100,h:ey-branchTopY+sbh+80};
  return {s,bounds};
}

function drawTransition(cx,cy,W,H,W2,H2,L,pad){
  let s='';
  const sc=getScale()*12/96;
  const sw=W*sc, sh=H*sc, sw2=W2*sc, sh2=H2*sc, sl=L*sc;
  const ox=cx-sl/2, oy=cy;
  const dw=(sw-sw2)/2, dh=(sh-sh2)/2;
  const pts=`${(ox-sw/2).toFixed(1)},${(oy-sh/2).toFixed(1)} ${(ox+sl+sw2/2).toFixed(1)},${(oy-sh2/2).toFixed(1)} ${(ox+sl+sw2/2).toFixed(1)},${(oy+sh2/2).toFixed(1)} ${(ox-sw/2).toFixed(1)},${(oy+sh/2).toFixed(1)} Z`;
  s+=`<polygon points="${pts}" fill="${CLR.fill}" stroke="${CLR.object}" stroke-width="1.2"/>`;
  s+=line(ox-sw/2,oy-sh/2,ox-sw/2,oy+sh/2,CLR.object,1.5);
  s+=line(ox+sl+sw2/2,oy-sh2/2,ox+sl+sw2/2,oy+sh2/2,CLR.object,1.5);
  if(state.showCL) s+=clLine(ox-sw/2-15,cy,ox+sl+sw2/2+15,cy);
  if(state.showDims){
    s+=dimLine(ox-sw/2,oy-sh/2,ox+sl+sw2/2,oy-sh/2,fmtDim(L),22,true);
    s+=dimLine(ox-sw/2-4,oy-sh/2,ox-sw/2-4,oy+sh/2,fmtDim(H),24,false);
    s+=dimLine(ox+sl+sw2/2+4,oy-sh2/2,ox+sl+sw2/2+4,oy+sh2/2,fmtDim(H2),24,false);
  }
  s+=txt(cx-sw*0.2,cy+3,fmtDim(W)+'×'+fmtDim(H),8,'middle',CLR.object,'bold');
  s+=txt(cx+sw*0.6,cy+3,fmtDim(W2)+'×'+fmtDim(H2),8,'middle',CLR.object);
  const bounds={x:ox-sw/2-70,y:oy-sh/2-40,w:sl+sw2/2+sw/2+100,h:sh+80};
  return {s,bounds};
}

function buildDrawing(){
  const d=state.dims;
  const W=d.W||24,H=d.H||18,L=d.L||36,R=d.R||18,W2=d.W2||16,H2=d.H2||12,Wb=d.Wb||12,Hb=d.Hb||12,O=d.O||12;
  const svgEl=document.getElementById('mainSvg');
  const wrapEl=document.getElementById('svgWrap');
  const svgW=wrapEl.clientWidth||900;
  const tbH=84;
  const svgH=wrapEl.clientHeight||600;
  const cx=svgW/2, cy=(svgH-tbH)/2+20;
  let result;
  switch(state.fitting){
    case 'straight':  result=drawStraight(cx,cy,W,H,L,20);break;
    case 'elbow90':   result=drawElbow(cx,cy,W,H,R,90,20);break;
    case 'elbow45':   result=drawElbow(cx,cy,W,H,R,45,20);break;
    case 'tee':       result=drawTee(cx,cy,W,H,Wb,Hb,20);break;
    case 'wye':       result=drawWye(cx,cy,W,H,Wb,Hb,20);break;
    case 'reducer':   result=drawReducer(cx,cy,W,H,W2,H2,L,20);break;
    case 'offset':    result=drawOffset(cx,cy,W,H,O,L,20);break;
    case 'cap':       result=drawCap(cx,cy,W,H,20);break;
    case 'cross':     result=drawCross(cx,cy,W,H,Wb,Hb,20);break;
    case 'transition':result=drawTransition(cx,cy,W,H,W2,H2,L,20);break;
    default:          result=drawStraight(cx,cy,W,H,L,20);
  }
  const area=W*H;
  const cfm=Math.round(area/144*2000);
  const sc=getScale();
  document.getElementById('infoFitting').textContent=FITTINGS.find(f=>f.id===state.fitting).label.replace('\n',' ');
  document.getElementById('infoWH').textContent=`${fmtDim(W)} × ${fmtDim(H)}`;
  document.getElementById('infoArea').textContent=`${(area/144).toFixed(2)} ft²`;
  document.getElementById('infoCFM').textContent=`${cfm.toLocaleString()} CFM`;
  document.getElementById('infoGauge').textContent=document.getElementById('gaugeSelect').value+' ga';
  const sc2=getScale();
  document.getElementById('infoClass').textContent=sc2<=1?'A (≤2" SP)':'B (≤4" SP)';
  const tb=titleBlock(svgW,svgH,tbH);
  let border=`<rect x="10" y="10" width="${svgW-20}" height="${svgH-tbH-10}" fill="none" stroke="${CLR.object}" stroke-width="1.5"/>`;
  border+=`<rect x="14" y="14" width="${svgW-28}" height="${svgH-tbH-18}" fill="none" stroke="${CLR.object}" stroke-width="0.4"/>`;
  const scaleLabel=`<text x="${svgW/2}" y="${svgH-tbH-6}" font-size="8" text-anchor="middle" fill="#AAA" font-family="'Arial',sans-serif">Scale: ${document.getElementById('scaleSelect').options[document.getElementById('scaleSelect').selectedIndex].text} — Dimensions in inches unless noted</text>`;
  svgEl.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`);
  svgEl.setAttribute('width',svgW);
  svgEl.setAttribute('height',svgH);
  svgEl.innerHTML=`<defs><clipPath id="hcp"><rect x="0" y="0" width="0" height="0"/></clipPath></defs><rect width="${svgW}" height="${svgH}" fill="white"/>${drawGrid(svgW,svgH-tbH,24)}${result.s}${border}${scaleLabel}${tb}`;
}

function redraw(){buildDrawing()}

function zoomFit(){redraw()}

function exportSVG(){
  const svgEl=document.getElementById('mainSvg');
  const ser=new XMLSerializer();
  let src=ser.serializeToString(svgEl);
  src='<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">'+src;
  const blob=new Blob([src],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const fit=FITTINGS.find(f=>f.id===state.fitting).label.replace('\n','-').replace(/\s/g,'');
  a.download=`HVAC_${fit}_${state.dims.W}x${state.dims.H}.svg`;
  a.click();
  URL.revokeObjectURL(url);
}

buildFittingGrid();
buildDimInputs();
setTimeout(()=>{redraw();},100);
window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(redraw,150)});
</script>
