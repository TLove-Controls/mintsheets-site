<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Overflow Probe</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    iframe { width: 390px; height: 900px; border: 1px solid #ccc; display: block; }
    pre { white-space: pre-wrap; font-size: 14px; }
  </style>
</head>
<body>
  <iframe id="frame"></iframe>
  <pre id="out">Loading...</pre>
  <script>
    const params = new URLSearchParams(location.search);
    const target = params.get('target') || '/';
    const frame = document.getElementById('frame');
    const out = document.getElementById('out');
    frame.src = target;
    frame.onload = () => {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const root = doc.documentElement;
      const body = doc.body;
      const clientWidth = root.clientWidth;
      const scrollWidth = root.scrollWidth;
      const offenders = [];
      [...doc.querySelectorAll('body *')].forEach((el) => {
        const rect = el.getBoundingClientRect();
        if (rect.width > 0 && rect.right - clientWidth > 1) {
          offenders.push({
            tag: el.tagName.toLowerCase(),
            cls: el.className || '',
            id: el.id || '',
            right: rect.right,
            left: rect.left,
            width: rect.width,
            overflow: rect.right - clientWidth,
            text: (el.innerText || el.textContent || '').trim().slice(0, 80)
          });
        }
      });
      offenders.sort((a, b) => b.overflow - a.overflow);
      out.textContent = JSON.stringify({
        target,
        innerWidth: win.innerWidth,
        clientWidth,
        scrollWidth,
        bodyScrollWidth: body.scrollWidth,
        topOffenders: offenders.slice(0, 20)
      }, null, 2);
    };
  </script>
</body>
</html>
